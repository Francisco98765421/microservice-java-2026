spring.application.name=config-service
server.port=8888

#spring.profiles.active=native

#spring.cloud.config.server.native.search-locations=classpath:/configs/{application}

spring.cloud.config.server.git.uri=https://github.com/Francisco98765421/microservice-java-2026.git
spring.cloud.config.server.git.search-paths=configs/{application}
spring.cloud.config.server.git.default-label=main

#Self Registration Pattern
eureka.client.service-url.default-zone=http://localhost:8761/eureka
#Ideal para ambiente containerizados
eureka.instance.prefer-ip-address=true
#Personalizar o id de cada instância
eureka.instance.instance-id=${spring.application.name}:${server.port}
#Indicar que o Service Registry deve validar a săo de do serviçăo através do actuator, e năo somente Heartbeat
# Opcional - Valor Default = TRUE
eureka.client.healthcheck.enabled=true

#Configuraçăo maxinima para atuaçăo com o Service Registry de forma consciente
management.endpoints.web.exposure.include=health,info,metrics,circuit-breakers,circuit-breaker-events
#ATENÇĂO: Cuidado a expor esses dados
#Exibir todas as informaçőes de săo de da aplicaçăo
management.endpoint.health.show-details=always
#Exibir informaçőes no endpoint /actuator/info
management.info.env.enabled=true

#Personalizaçăo de informaçőes do endpoint /actuator/info
info.app.name=${spring.application.name}
info.app.description=Microservice Java 2026
info.app.autor=Francisco Luis Volpato
#Personalizaçăo de Metadatas para o Eureka Service Registry
eureka.instance.metadata-map.github.repo=Francisco98765421/microservice-java-2026

#Definir a ulizaçăo das Probes Liveness e Readiness + exibiçăo de de informaçőes de componentes diversos
# Opcional: Padrăo já é TRUE
management.endpoint.health.probes.enabled=true
management.health.defaults.enabled=true